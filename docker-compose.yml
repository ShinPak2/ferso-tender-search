version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: h025-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tender
      POSTGRES_PASSWORD: tender_secret
      POSTGRES_DB: tendersearch
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tender -d tendersearch"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tendersearch


  zakupki-postgres:
    image: postgres:16-alpine
    container_name: h025-zakupki-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: zakupki
      POSTGRES_PASSWORD: zakupki_secret
      POSTGRES_DB: zakupki_cache
    volumes:
      - zakupki_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zakupki -d zakupki_cache"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tendersearch

  zakupki-api:
    build:
      context: ./zakupki_api
      dockerfile: Dockerfile
    container_name: h025-zakupki-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://zakupki:zakupki_secret@zakupki-postgres:5432/zakupki_cache
      FILE_STORAGE_DIR: /data/files
      INTERNAL_API_TOKEN: ${ZAKUPKI_INTERNAL_API_TOKEN:-zakupki-internal-secret-change-in-prod}
      ZAKUPKI_SYNC_ENABLED: ${ZAKUPKI_SYNC_ENABLED:-true}
      ZAKUPKI_SYNC_HOUR: ${ZAKUPKI_SYNC_HOUR:-2}
      ZAKUPKI_SYNC_MINUTE: ${ZAKUPKI_SYNC_MINUTE:-15}
      ZAKUPKI_SEARCH_QUERY: ${ZAKUPKI_SEARCH_QUERY:-стройка}
      ZAKUPKI_RECORDS_PER_PAGE: ${ZAKUPKI_RECORDS_PER_PAGE:-_50}
      ZAKUPKI_INITIAL_MAX_PAGES: ${ZAKUPKI_INITIAL_MAX_PAGES:-20}
      ZAKUPKI_REQUEST_DELAY_SECONDS: ${ZAKUPKI_REQUEST_DELAY_SECONDS:-1.2}
      MARKDOWN_STORAGE_DIR: /data/markdown
      MARKDOWN_QUEUE_ENABLED: ${MARKDOWN_QUEUE_ENABLED:-true}
      MARKDOWN_QUEUE_INTERVAL_MINUTES: ${MARKDOWN_QUEUE_INTERVAL_MINUTES:-15}
      MARKDOWN_BATCH_SIZE: ${MARKDOWN_BATCH_SIZE:-10}
      MARKDOWN_ENQUEUE_LIMIT: ${MARKDOWN_ENQUEUE_LIMIT:-1000}
      MARKDOWN_MAX_TASK_ATTEMPTS: ${MARKDOWN_MAX_TASK_ATTEMPTS:-3}
      MARKDOWN_REQUEST_DELAY_SECONDS: ${MARKDOWN_REQUEST_DELAY_SECONDS:-0.3}
      MARKDOWN_MAX_FILE_SIZE_MB: ${MARKDOWN_MAX_FILE_SIZE_MB:-200}
      MARKDOWN_ENABLE_PLUGINS: ${MARKDOWN_ENABLE_PLUGINS:-false}
    volumes:
      - zakupki_files:/data/files
      - zakupki_markdown:/data/markdown
    depends_on:
      zakupki-postgres:
        condition: service_healthy
    networks:
      - tendersearch
    ports:
      - "127.0.0.1:18080:8000"


  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: h025-backend
    restart: unless-stopped
    environment:
      DB_USER: tender
      DB_PASS: tender_secret
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: tendersearch
      JWT_SECRET: ${JWT_SECRET:-tendersearch-jwt-secret-change-in-prod}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      DEBUG: ${DEBUG:-false}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@tendersearch.ru}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tendersearch
      - traefik

  frontend:
    image: nginx:alpine
    container_name: h025-frontend
    restart: unless-stopped
    volumes:
      - ./frontend/public:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.h025.rule=Host(`tenders.ivoryhome.ru`)"
      - "traefik.http.routers.h025.entrypoints=websecure"
      - "traefik.http.routers.h025.tls.certresolver=letsencrypt"
      - "traefik.http.services.h025.loadbalancer.server.port=80"
    networks:
      - traefik

volumes:
  postgres_data:
  zakupki_postgres_data:
  zakupki_files:
  zakupki_markdown:

networks:
  tendersearch:
    driver: bridge
  traefik:
    external: true

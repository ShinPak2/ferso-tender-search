<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — TenderSearch</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">

<div class="auth-card card">
  <h2>Вход в TenderSearch</h2>
  <p class="subtitle text-muted">Войдите для доступа к подборкам тендеров</p>

  <form id="login-form">
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" class="form-input" placeholder="you@example.com" required autofocus>
    </div>
    <div class="form-group">
      <label for="password">Пароль</label>
      <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required>
    </div>
    <div id="login-error" class="form-error" style="display:none;margin-bottom:12px"></div>
    <button type="submit" class="btn btn-primary">Войти</button>
  </form>

  <p class="auth-link">
    Нет аккаунта? <a href="/register">Зарегистрироваться</a>
  </p>
  <p class="auth-link">
    <a href="/">← На главную</a>
  </p>
</div>

<script src="js/api.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Подписки — TenderSearch</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="dashboard-layout">

<aside class="sidebar">
  <div class="sidebar-logo">
    <a href="/dashboard" class="logo"><span class="icon">🔍</span> TenderSearch</a>
  </div>
  <ul class="sidebar-nav">
    <li><a href="/dashboard"><span class="icon">📊</span> Обзор</a></li>
    <li><a href="/dashboard/subscriptions.html" class="active"><span class="icon">📬</span> Подписки</a></li>
    <li><a href="/dashboard/tenders.html"><span class="icon">📋</span> Тендеры</a></li>
    <li><a href="/dashboard/profile.html"><span class="icon">👤</span> Профиль</a></li>
    <li><a href="/dashboard/plan.html"><span class="icon">💳</span> Тариф</a></li>
    <li style="margin-top:40px;padding-top:20px;border-top:1px solid var(--border)">
      <a href="#" onclick="API.logout();return false"><span class="icon">🚪</span> Выйти</a>
    </li>
  </ul>
</aside>

<main class="main-content">
  <div class="dashboard-header">
    <div>
      <h2>📬 Управление подписками</h2>
      <p class="text-muted">Создавайте подписки для автоматического подбора тендеров</p>
    </div>
    <button class="btn btn-primary btn-sm" onclick="document.getElementById('create-sub-form').classList.toggle('hidden')">
      + Новая подписка
    </button>
  </div>

  <!-- Create Subscription Form -->
  <div id="create-sub-form" class="card mb-3 hidden">
    <h3>Новая подписка</h3>
    <form onsubmit="Dashboard.createSubscription(event);return false" class="mt-2">
      <div class="form-group">
        <label>Название подписки</label>
        <input type="text" name="name" class="form-input" placeholder="IT-тендеры Москва" required>
      </div>
      <div class="form-group">
        <label>Ключевые слова (через запятую)</label>
        <input type="text" name="keywords" class="form-input" placeholder="ПО, IT, разработка, компьютеры">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
        <div class="form-group">
          <label>Тип закона</label>
          <select name="law_type" class="form-input">
            <option value="">Любой</option>
            <option value="44-ФЗ">44-ФЗ</option>
            <option value="223-ФЗ">223-ФЗ</option>
          </select>
        </div>
        <div class="form-group">
          <label>Регион</label>
          <input type="text" name="region" class="form-input" placeholder="Москва">
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
        <div class="form-group">
          <label>Цена от (₽)</label>
          <input type="number" name="price_min" class="form-input" placeholder="0">
        </div>
        <div class="form-group">
          <label>Цена до (₽)</label>
          <input type="number" name="price_max" class="form-input" placeholder="10 000 000">
        </div>
      </div>
      <button type="submit" class="btn btn-primary">Создать подписку</button>
      <button type="button" class="btn btn-ghost" onclick="document.getElementById('create-sub-form').classList.add('hidden')">Отмена</button>
    </form>
  </div>

  <!-- Subscriptions List -->
  <div id="subscriptions-list">
    <div class="loading"><span class="spinner"></span> Загрузка подписок...</div>
  </div>
</main>

<script src="../js/api.js"></script>
<script src="../js/dashboard.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  Dashboard.loadSubscriptions();
});
</script>
</body>
</html>

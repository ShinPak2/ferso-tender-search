<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Карточка тендера — TenderSearch</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .verdict-block {
      border-left: 4px solid;
      background: var(--bg-card);
      padding: 1rem 1.25rem;
      margin-bottom: 1rem;
      border-radius: 0 6px 6px 0;
    }
    .verdict-block.match { border-color: var(--accent-green); }
    .verdict-block.review { border-color: var(--accent-orange); }
    .verdict-block.no_match { border-color: var(--accent-red); }

    .verdict-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 0.9rem;
    }
    .verdict-badge.match { background: var(--accent-green); color: #000; }
    .verdict-badge.review { background: var(--accent-orange); color: #000; }
    .verdict-badge.no_match { background: var(--accent-red); color: #fff; }

    .score-bar {
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
      margin-top: 4px;
    }
    .score-bar-fill {
      height: 100%;
      background: var(--accent-green);
      transition: width 0.3s;
    }
    .score-bar-fill.review { background: var(--accent-orange); }
    .score-bar-fill.no_match { background: var(--accent-red); }

    .verdict-list {
      list-style: none;
      padding: 0;
      margin: 0.5rem 0 0;
    }
    .verdict-list li {
      padding: 4px 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .quote-block {
      background: var(--bg-tertiary);
      border-left: 3px solid var(--accent-purple);
      padding: 8px 12px;
      margin: 6px 0;
      font-size: 0.9rem;
      font-style: italic;
      color: var(--text-secondary);
    }
    .quote-block .src { color: var(--text-muted); font-style: normal; font-size: 0.8rem; }

    .nmck-warning {
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid var(--accent-orange);
      border-radius: 6px;
      padding: 0.75rem 1rem;
      margin-top: 0.5rem;
      font-size: 0.9rem;
    }
    .nmck-warning strong { color: var(--accent-orange); }

    .ai-confidence {
      display: inline-block;
      padding: 2px 8px;
      background: var(--bg-tertiary);
      border-radius: 10px;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .requirements-grid {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 4px 12px;
      font-size: 0.9rem;
    }
    .requirements-grid dt { color: var(--text-muted); }
    .requirements-grid dd { margin: 0; }

    .analysis-loading {
      padding: 2rem;
      text-align: center;
      color: var(--text-muted);
    }
  </style>
</head>
<body class="dashboard-layout">

<aside class="sidebar">
  <div class="sidebar-logo">
    <a href="/dashboard" class="logo"><span class="icon">🔍</span> TenderSearch</a>
  </div>
  <ul class="sidebar-nav">
    <li><a href="/dashboard"><span class="icon">📊</span> Обзор</a></li>
    <li><a href="/dashboard/subscriptions.html"><span class="icon">📬</span> Подписки</a></li>
    <li><a href="/dashboard/tenders.html" class="active"><span class="icon">📋</span> Тендеры</a></li>
    <li><a href="/dashboard/profile.html"><span class="icon">👤</span> Профиль</a></li>
    <li><a href="/dashboard/plan.html"><span class="icon">💳</span> Тариф</a></li>
    <li style="margin-top:40px;padding-top:20px;border-top:1px solid var(--border)">
      <a href="#" onclick="API.logout();return false"><span class="icon">🚪</span> Выйти</a>
    </li>
  </ul>
</aside>

<main class="main-content">
  <div id="tender-content">
    <div class="loading"><span class="spinner"></span> Загрузка тендера...</div>
  </div>

  <!-- AI-анализ + матчинг (h025ai-14) -->
  <div id="ai-analysis"></div>

  <!-- Документы -->
  <div id="tender-documents"></div>
</main>

<script src="../js/api.js"></script>
<script src="../js/dashboard.js"></script>
<script>
const TenderDetail = (() => {

  // ── Helpers ───────────────────────────────────────────

  function formatPrice(p) {
    if (p == null) return '—';
    return new Intl.NumberFormat('ru-RU', {
      style: 'currency', currency: 'RUB', maximumFractionDigits: 0,
    }).format(p);
  }

  function formatDate(s) {
    if (!s) return '—';
    return new Date(s).toLocaleDateString('ru-RU', {
      day: '2-digit', month: '2-digit', year: 'numeric',
    });
  }

  function escapeHtml(text) {
    if (text == null) return '';
    const div = document.createElement('div');
    div.textContent = String(text);
    return div.innerHTML;
  }

  function vClass(verdict) {
    if (verdict === 'match') return 'match';
    if (verdict === 'review') return 'review';
    return 'no_match';
  }

  function vLabel(verdict) {
    if (verdict === 'match') return '✅ СОВПАДАЕТ';
    if (verdict === 'review') return '⚠️ ТРЕБУЕТ ВНИМАНИЯ';
    return '❌ НЕ ПОДХОДИТ';
  }

  // ── Load tender ───────────────────────────────────────

  async function load() {
    if (!Dashboard.requireAuth()) return;
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    if (!id) {
      document.getElementById('tender-content').innerHTML =
        '<div class="empty-state"><p>Тендер не указан</p></div>';
      return;
    }

    try {
      const tender = await API.request(`/tenders/${id}`);
      renderTender(tender);
      // Load analysis + match in parallel
      const [analysis, match] = await Promise.all([
        API.request(`/tenders/${id}/analysis`).catch(() => null),
        API.request(`/tenders/${id}/match`).catch(e => {
          console.warn('Match fetch failed:', e);
          return null;
        }),
      ]);
      renderAnalysisAndMatch(tender, analysis, match);
      renderDocuments(tender);
    } catch (e) {
      document.getElementById('tender-content').innerHTML =
        `<div class="empty-state"><p class="text-danger">Ошибка: ${escapeHtml(e.message)}</p></div>`;
    }
  }

  // ── Render header + meta ─────────────────────────────

  function renderTender(tender) {
    const c = document.getElementById('tender-content');
    c.innerHTML = `
      <div class="tender-detail-header">
        <a href="/dashboard/tenders.html" class="btn btn-ghost btn-sm mb-2">← Назад к тендерам</a>
        <h2>${escapeHtml(tender.title)}</h2>
        <div class="tender-detail-meta">
          <span class="badge badge-purple">${escapeHtml(tender.law_type || '—')}</span>
          <span class="badge badge-blue">${escapeHtml(tender.status || 'active')}</span>
          ${tender.region ? `<span class="badge badge-orange">📍 ${escapeHtml(tender.region)}</span>` : ''}
          ${tender.external_id ? `<span class="badge">№ ${escapeHtml(tender.external_id)}</span>` : ''}
        </div>
      </div>

      <div class="stats-grid">
        <div class="stat-card card">
          <div class="stat-value">${formatPrice(tender.price)}</div>
          <div class="stat-label">Цена контракта</div>
        </div>
        <div class="stat-card card">
          <div class="stat-value">${formatDate(tender.deadline)}</div>
          <div class="stat-label">Дедлайн подачи</div>
        </div>
        <div class="stat-card card">
          <div class="stat-value">${escapeHtml(tender.customer || '—')}</div>
          <div class="stat-label">Заказчик</div>
        </div>
        <div class="stat-card card">
          <div class="stat-value">${formatDate(tender.published_at)}</div>
          <div class="stat-label">Опубликован</div>
        </div>
      </div>

      <div class="card mt-3">
        <h3>Описание</h3>
        <p>${escapeHtml(tender.description || 'Описание отсутствует')}</p>
        ${tender.source_url ? `<p style="margin-top: 0.5rem;"><a href="${escapeHtml(tender.source_url)}" target="_blank" rel="noopener">Открыть на zakupki.gov.ru →</a></p>` : ''}
      </div>
    `;
  }

  // ── Render AI analysis + matcher verdict (h025ai-14) ──

  function renderAnalysisAndMatch(tender, analysis, match) {
    const c = document.getElementById('ai-analysis');
    if (!analysis && !match) {
      c.innerHTML = `
        <div class="card analysis-loading">
          <h3>🤖 AI-анализ и матчинг</h3>
          <p>Анализ ещё не выполнен. Вернитесь через несколько минут — скоринг появится автоматически.</p>
        </div>`;
      return;
    }

    let html = '<div class="card mt-3"><h3>🤖 AI-анализ и матчинг</h3>';

    // ── Match verdict ──
    if (match) {
      const klass = vClass(match.verdict);
      const reasonsHtml = (match.reasons || []).map(r =>
        `<li>• ${escapeHtml(r)}</li>`
      ).join('');
      const b = match.breakdown || {};
      html += `
        <div class="verdict-block ${klass}">
          <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
            <span class="verdict-badge ${klass}">${vLabel(match.verdict)}</span>
            <span style="font-weight:700; font-size:1.4rem;">${match.score}/100</span>
            <span class="ai-confidence">уверенность ${match.confidence || 0}%</span>
          </div>
          <div class="score-bar"><div class="score-bar-fill ${klass}" style="width:${match.score}%"></div></div>

          ${b.nmck_outlier_warning ? `
            <div class="nmck-warning">
              <strong>⚠️ Проверьте вручную:</strong> ${escapeHtml(b.nmck_outlier_warning)}
              <div style="font-size: 0.85rem; color: var(--text-muted); margin-top: 4px;">
                Возможно, парсер подставил рамочный лимит вместо НМЦК. Откройте карточку на zakupki.gov.ru.
              </div>
            </div>
          ` : ''}

          ${reasonsHtml ? `<ul class="verdict-list">${reasonsHtml}</ul>` : ''}

          <details style="margin-top: 0.75rem;">
            <summary style="cursor: pointer; color: var(--text-muted); font-size: 0.9rem;">
              Разбивка по баллам
            </summary>
            <table style="width:100%; margin-top:8px; font-size:0.9rem; border-collapse: collapse;">
              <tr><td>ОКПД2</td><td><strong>${b.okpd2_score || 0}/30</strong></td><td>${escapeHtml(b.okpd2_reason || '')}</td></tr>
              <tr><td>Регион</td><td><strong>${b.region_score || 0}/20</strong></td><td>${escapeHtml(b.region_reason || '')}</td></tr>
              <tr><td>Сумма</td><td><strong>${b.price_score || 0}/20</strong></td><td>${escapeHtml(b.price_reason || '')}</td></tr>
              <tr><td>Лицензии</td><td><strong>${b.licenses_score || 0}/20</strong></td><td>${escapeHtml(b.licenses_reason || '')}</td></tr>
              <tr><td>Время</td><td><strong>${b.time_score || 0}/10</strong></td><td>${escapeHtml(b.time_reason || '')}</td></tr>
            </table>
          </details>
        </div>
      `;
    }

    // ── AI extraction ──
    if (analysis) {
      const fin = analysis.financial || {};
      const reqs = analysis.requirements || {};
      const dls = analysis.deadlines || {};
      const nmck = fin.nmck_rub;

      html += `
        <div class="verdict-block">
          <h4>📄 Сводка по документам</h4>
          ${analysis.subject ? `<p><strong>${escapeHtml(analysis.subject)}</strong></p>` : ''}

          <div class="requirements-grid" style="margin-top: 0.5rem;">
            <dt>ОКПД2:</dt><dd>${(analysis.okpd2_extracted || []).map(escapeHtml).join(', ') || '—'}</dd>
            <dt>Регионы:</dt><dd>${(analysis.regions_extracted || []).map(escapeHtml).join(', ') || '—'}</dd>
            <dt>Срок исполнения:</dt><dd>${dls.execution_days ? dls.execution_days + ' дн.' : '—'}</dd>
            <dt>Подача до:</dt><dd>${escapeHtml(dls.submission || '—')}</dd>
            ${fin.application_guarantee_pct != null ? `<dt>Обеспечение заявки:</dt><dd>${fin.application_guarantee_pct}%${fin.application_guarantee_rub ? ` (${formatPrice(fin.application_guarantee_rub)})` : ''}</dd>` : ''}
            ${fin.contract_guarantee_pct != null ? `<dt>Обеспечение контракта:</dt><dd>${fin.contract_guarantee_pct}%${fin.contract_guarantee_rub ? ` (${formatPrice(fin.contract_guarantee_rub)})` : ''}</dd>` : ''}
            ${reqs.sro ? `<dt>СРО:</dt><dd>требуется</dd>` : ''}
            ${reqs.licenses && reqs.licenses.length ? `<dt>Лицензии:</dt><dd>${reqs.licenses.map(l => escapeHtml(l.type + (l.level ? ' ' + l.level : ''))).join(', ')}</dd>` : ''}
            ${reqs.experience_years ? `<dt>Опыт:</dt><dd>от ${reqs.experience_years} лет</dd>` : ''}
          </div>

          ${nmck != null ? `
            <div style="margin-top: 0.5rem; padding: 0.5rem 0.75rem; background: var(--bg-tertiary); border-radius: 4px;">
              💰 <strong>НМЦК:</strong> ${formatPrice(nmck)}
              <span style="color: var(--text-muted); font-size: 0.85rem;">(источник: ${escapeHtml(fin.nmck_source || 'card')})</span>
            </div>
          ` : `
            <div class="nmck-warning">
              <strong>ℹ️ НМЦК не указана</strong> — карточка тендера не содержит начальную (максимальную) цену контракта.
              Это нормально для 95% тендеров 44-ФЗ. Цена будет определена по итогам процедуры.
            </div>
          `}

          ${analysis.criteria && analysis.criteria.length ? `
            <h4 style="margin-top:1rem; font-size: 1rem;">Критерии оценки</h4>
            <ul style="list-style:none; padding:0;">
              ${analysis.criteria.map(c =>
                `<li>📊 <strong>${escapeHtml(c.name)}</strong> — ${escapeHtml(String(c.weight_pct))}%</li>`
              ).join('')}
            </ul>
          ` : ''}

          ${analysis.citations && analysis.citations.source_quotes && analysis.citations.source_quotes.length ? `
            <details style="margin-top: 0.75rem;">
              <summary style="cursor: pointer; color: var(--text-muted); font-size: 0.9rem;">
                📑 Цитаты из документов (${analysis.citations.source_quotes.length})
              </summary>
              <div style="margin-top: 0.5rem;">
                ${analysis.citations.source_quotes.map(q => `
                  <div class="quote-block">${escapeHtml(q)}</div>
                `).join('')}
              </div>
            </details>
          ` : ''}

          <div style="margin-top: 0.75rem; font-size: 0.85rem; color: var(--text-muted);">
            Источник: ${escapeHtml(analysis.source || 'deepseek')} ·
            Уверенность AI: ${analysis.confidence_score || 0}% ·
            Версия: ${analysis.version}
          </div>
        </div>
      `;
    }

    html += '</div>';
    c.innerHTML = html;
  }

  // ── Documents ─────────────────────────────────────────

  function renderDocuments(tender) {
    const c = document.getElementById('tender-documents');
    const docs = tender.documents || [];
    if (docs.length === 0) {
      c.innerHTML = '';
      return;
    }
    c.innerHTML = `
      <div class="card mt-3">
        <h3>📄 Документы (${docs.length})</h3>
        <ul style="list-style:none; padding:0;">
          ${docs.map(d => `
            <li style="padding:8px 0; border-bottom:1px solid var(--border)">
              📄 ${escapeHtml(d.name)}
              ${d.file_url ? `<a href="${escapeHtml(d.file_url)}" target="_blank" rel="noopener" class="btn btn-sm btn-ghost" style="margin-left:12px">Скачать</a>` : ''}
            </li>
          `).join('')}
        </ul>
      </div>
    `;
  }

  return { load };
})();

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', () => TenderDetail.load());
} else {
  TenderDetail.load();
}
</script>
</body>
</html>
